name: Publish Release

on:
  push:
    # Trigger on version tags like v1.0, v1.2.3
    tags:
      - 'v*'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'The release version (e.g., v1.0.0)'
        required: true

jobs:
  build_and_push_image:
    runs-on: ubuntu-latest
    # Grant permissions for the GITHUB_TOKEN to upload to ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.repository_owner == 'PEOPLE-ECCO' && 'ecco-eoap-example' || github.event.repository.name }}
          # This generates tags based on the Git tag
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create_eoap:
    runs-on: ubuntu-latest
    needs: build_and_push_image
    permissions:
      contents: write # Required to create a release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get the version from the tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create EOAP directory structure
        run: |
          mkdir -p eoap-package
          cp run.cwl example_parameters.json example.env README.md eoap-package/

      - name: Create Tarball
        run: |
          tar -czvf ecco-eoap-example-${{ env.VERSION }}.tar.gz -C eoap-package .

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ecco-eoap-example-${{ env.VERSION }}.tar.gz
          # The release will be created based on the git tag
          tag_name: ${{ env.VERSION }}
          # This will mark the release as a pre-release until you manually publish it
          prerelease: true